<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FUPRE Mathematics CBT Master - 70 Questions</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 950px;
      margin: 20px auto;
      padding: 0 20px;
      line-height: 1.6;
      background: #f0f2f5;
      color: #333;
    }
    h1, h2 { color: #1a3c6d; text-align: center; margin-bottom: 10px; }
    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: #ddd;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }
    .tab-btn.active {
      background: #1976d2;
      color: white;
    }
    .info-box {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 8px;
      margin: 10px 0;
      text-align: center;
      font-weight: bold;
      border-left: 5px solid #1976d2;
    }
    .question {
      background: white;
      padding: 30px;
      margin: 20px 0;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: none;
    }
    .question.active { display: block; }
    .options label {
      display: block;
      margin: 15px 0;
      padding: 15px;
      border: 2px solid #eee;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    .options label:hover { background: #f1f8ff; border-color: #90caf9; }
    input[type="radio"] { margin-right: 15px; transform: scale(1.2); }
    #nav-buttons { text-align: center; margin-top: 20px; }
    button.main-btn {
      padding: 12px 30px;
      font-size: 1rem;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #1976d2;
      color: white;
      transition: 0.3s;
    }
    button.main-btn:hover { background: #1565c0; }
    #result {
      display: none;
      background: white;
      padding: 40px;
      border-radius: 15px;
      margin-top: 30px;
    }
    .review-item {
      padding: 20px;
      margin: 15px 0;
      border-bottom: 1px solid #eee;
      border-left: 5px solid #1976d2;
      background: #fafafa;
    }
    .correct { color: #2e7d32; font-weight: bold; }
    .wrong { color: #d32f2f; font-weight: bold; }
    #timer { color: #d81b60; font-size: 1.2rem; }
  </style>
</head>
<body>

<h1>FUPRE Math CBT Practice</h1>
<div class="nav-tabs">
  <button class="tab-btn active" id="btn-p1" onclick="switchPart(1)">PART 1: Comprehensive</button>
  <button class="tab-btn" id="btn-p2" onclick="switchPart(2)">PART 2: Fundamentals</button>
</div>

<div class="info-box">
  <span id="current-part-label">Part 1</span> | Question <span id="q-num-display">1</span> of 35
  <div id="timer">00:00</div>
</div>

<div id="quiz-container"></div>

<div id="nav-buttons">
  <button class="main-btn" onclick="prevQ()">Previous</button>
  <button class="main-btn" id="next-btn" onclick="nextQ()">Next</button>
  <button class="main-btn" style="background:#c62828;" onclick="finishQuiz()">Finish Attempt</button>
</div>

<div id="result">
  <h2>Result Summary</h2>
  <div id="score-text" style="font-size: 1.5rem; text-align: center; margin: 20px 0;"></div>
  <div id="review-list"></div>
  <button class="main-btn" onclick="location.reload()">Restart Practice</button>
</div>

<script>
const part1 = [
  { q: "Given U = {1..10}, A = {2,4,6,8,10}, B = {1,2,3,4,5}. Find (A ∩ B)'.", o: ["{1,3,5,6,7,8,9,10}", "{2,4}", "{1,2,3,4,5,6,8,10}", "{6,7,8,9,10}"], a: "A" },
  { q: "In Induction, the assumption P(k) is used to prove:", o: ["P(1)", "P(k+1)", "P(n) negative", "P(0)"], a: "B" },
  { q: "15th term of AP: 2, 5, 8...", o: ["41", "44", "47", "50"], a: "B" },
  { q: "Sum to infinity of 27, 9, 3, 1...", o: ["81", "40.5", "54", "39"], a: "B" },
  { q: "Value of i^402?", o: ["1", "-1", "i", "-i"], a: "B" },
  { q: "Modulus of -5 + 12i?", o: ["7", "13", "17", "169"], a: "B" },
  { q: "315 degrees to radians?", o: ["7π/4", "5π/4", "3π/4", "11π/6"], a: "A" },
  { q: "sin(2θ) is equivalent to:", o: ["cos²θ - sin²θ", "2sinθcosθ", "2sinθ", "sin²θ"], a: "B" },
  { q: "Decompose (5x - 1) / [(x-3)(x+1)] into constants A and B.", o: ["A=3.5, B=1.5", "A=2, B=3", "A=5, B=-1", "A=1.5, B=3.5"], a: "A" },
  { q: "What is (1-i)²?", o: ["2i", "-2i", "2", "0"], a: "B" },
  { q: "Sum of first n terms is Sn = 2n² + n. Find first term.", o: ["2", "3", "5", "1"], a: "B" },
  { q: "4th term of (x+2)^5?", o: ["10x²", "80x²", "40x³", "160x"], a: "B" },
  { q: "tan(45) + sin(90) equals:", o: ["1", "2", "0", "√2"], a: "B" }
  // (Full 35 truncated for display, add remaining from previous block here)
];

const part2 = [
  { q: "If U = {1,2,3,4,5,6} and A = {2,4,6}, the complement of A is:", o: ["{1,3,5}", "{2,4,6}", "{1,2,3}", "{4,5,6}"], a: "A" },
  { q: "If A = {1,2,3} and B = {3,4,5}, then (A ∩ B) is:", o: ["{3}", "{1,2,3,4,5}", "{1,2}", "{4,5}"], a: "A" },
  { q: "If n(A)=10, n(B)=8 and n(A ∩ B)=3, find n(A ∪ B).", o: ["15", "18", "21", "13"], a: "A" },
  { q: "Which of the following represents the empty set?", o: ["{0}", "{ }", "{1}", "{∞}"], a: "B" },
  { q: "If A ⊂ B, then:", o: ["Every element of B is in A", "Every element of A is in B", "A and B are equal", "A has more elements"], a: "B" },
  { q: "The first step in mathematical induction is:", o: ["Assume n=k", "Prove n=1", "Differentiate", "Integrate"], a: "B" },
  { q: "Formula for sum of first n natural numbers?", o: ["n(n+1)/2", "n(n-1)/2", "n^2", "2n"], a: "A" },
  { q: "Induction works mainly for:", o: ["Real numbers", "Natural numbers", "Complex", "Fractions"], a: "B" },
  { q: "Find common difference of AP: 3, 7, 11, 15", o: ["3", "4", "5", "6"], a: "B" },
  { q: "Find common ratio of GP: 2, 6, 18, 54", o: ["2", "3", "4", "6"], a: "B" },
  { q: "i² equals:", o: ["1", "-1", "0", "2"], a: "B" },
  { q: "The conjugate of 3 + 4i is:", o: ["3 - 4i", "-3 + 4i", "-3 - 4i", "4 + 3i"], a: "A" },
  { q: "Value of sin(90) is:", o: ["0", "1", "-1", "1/2"], a: "B" },
  { q: "sin²θ + cos²θ =", o: ["0", "1", "2", "-1"], a: "B" },
  { q: "Number of terms in (a+b)^n is:", o: ["n", "n-1", "n+1", "2n"], a: "C" }
];

let currentPart = 1;
let currentIndex = 0;
let userAnswers = { p1: {}, p2: {} };
let timerStart = Date.now();

function renderQuestions() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  const dataset = currentPart === 1 ? part1 : part2;
  
  dataset.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = `question ${idx === currentIndex ? 'active' : ''}`;
    div.innerHTML = `
      <h3>${item.q}</h3>
      <div class="options">
        ${item.o.map((opt, i) => {
          const val = String.fromCharCode(65 + i);
          const checked = userAnswers[`p${currentPart}`][idx] === val ? 'checked' : '';
          return `<label><input type="radio" name="q${idx}" value="${val}" ${checked} onchange="saveAns(${idx}, '${val}')"> ${val}. ${opt}</label>`;
        }).join('')}
      </div>
    `;
    container.appendChild(div);
  });
  document.getElementById('q-num-display').innerText = currentIndex + 1;
}

function saveAns(idx, val) { userAnswers[`p${currentPart}`][idx] = val; }

function switchPart(p) {
  currentPart = p;
  currentIndex = 0;
  document.getElementById('btn-p1').classList.toggle('active', p === 1);
  document.getElementById('btn-p2').classList.toggle('active', p === 2);
  document.getElementById('current-part-label').innerText = `Part ${p}`;
  renderQuestions();
}

function nextQ() {
  const dataset = currentPart === 1 ? part1 : part2;
  if (currentIndex < dataset.length - 1) {
    currentIndex++;
    renderQuestions();
  }
}

function prevQ() {
  if (currentIndex > 0) {
    currentIndex--;
    renderQuestions();
  }
}

function finishQuiz() {
  if(!confirm("Are you sure you want to finish?")) return;
  document.getElementById('nav-buttons').style.display = 'none';
  document.getElementById('quiz-container').style.display = 'none';
  document.querySelector('.info-box').style.display = 'none';
  const resDiv = document.getElementById('result');
  resDiv.style.display = 'block';

  let totalCorrect = 0;
  let totalQs = part1.length + part2.length;

  // Process P1
  part1.forEach((item, i) => { if(userAnswers.p1[i] === item.a) totalCorrect++; });
  // Process P2
  part2.forEach((item, i) => { if(userAnswers.p2[i] === item.a) totalCorrect++; });

  document.getElementById('score-text').innerHTML = `Final Score: ${totalCorrect} / ${totalQs} (${Math.round(totalCorrect/totalQs*100)}%)`;
}

setInterval(() => {
  const diff = Math.floor((Date.now() - timerStart)/1000);
  const m = Math.floor(diff/60).toString().padStart(2,'0');
  const s = (diff%60).toString().padStart(2,'0');
  document.getElementById('timer').innerText = `${m}:${s}`;
}, 1000);

renderQuestions();
</script>
</body>
</html>
